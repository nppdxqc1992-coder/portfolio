<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈丹霞 - 景观设计师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrap { text-align: center; }
        .name { font-size: 32px; font-weight: 600; letter-spacing: 6px; margin-bottom: 16px; }
        .line { width: 40px; height: 1px; background: #444; margin: 0 auto 24px; }
        .msg { font-size: 14px; color: #666; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="wrap">
        <p class="name">陈丹霞</p>
        <div class="line"></div>
        <p class="msg">作品集更新中，敬请期待</p>
    </div>
</body>
</html>
